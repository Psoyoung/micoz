spring:
  application:
    name: micoz-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
    validate-on-migrate: true

server:
  # Render 등 PaaS가 주입하는 PORT 우선 → SERVER_PORT → 8080. (PaaS는 동적 PORT를 리슨하길 기대)
  port: ${PORT:${SERVER_PORT:8080}}
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
      slo:
        http.server.requests: 10ms, 50ms, 100ms, 500ms
    tags:
      application: micoz-backend

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

micoz:
  jwt:
    secret: ${JWT_SECRET}
    access-token-validity-minutes: 30
    refresh-token-validity-days: 14
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  admin-init:
    user-id: ${ADMIN_INIT_USER_ID:admin}
    user-name: ${ADMIN_INIT_USER_NAME:운영관리자}
    password: ${ADMIN_INIT_PASSWORD:}
    email: ${ADMIN_INIT_EMAIL:}
