spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/micoz}
    username: ${DB_USERNAME:micoz}
    password: ${DB_PASSWORD:micoz}
  jpa:
    properties:
      hibernate:
        format_sql: true
    show-sql: true

logging:
  level:
    com.micoz: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

micoz:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-please-change-in-production-minimum-256-bits-long}
