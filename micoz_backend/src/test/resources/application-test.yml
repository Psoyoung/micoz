spring:
  datasource:
    url: jdbc:tc:postgresql:15-alpine:///micoz_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

logging:
  level:
    com.micoz: INFO
    org.flywaydb: INFO
    org.testcontainers: INFO

micoz:
  jwt:
    secret: test-only-jwt-secret-please-change-minimum-256-bits-long-string
  cors:
    allowed-origins: http://localhost:3000
