services:
  postgres:
    image: postgres:15-alpine
    container_name: micoz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-micoz}
      POSTGRES_USER: ${POSTGRES_USER:-micoz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-micoz}
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-micoz} -d ${POSTGRES_DB:-micoz}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - micoz-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: micoz-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-micoz}
      DB_USERNAME: ${POSTGRES_USER:-micoz}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-micoz}
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-please-change-me-to-a-long-random-secret-at-least-32-chars}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      ADMIN_INIT_USER_ID: ${ADMIN_INIT_USER_ID:-admin}
      ADMIN_INIT_USER_NAME: ${ADMIN_INIT_USER_NAME:-운영관리자}
      ADMIN_INIT_PASSWORD: ${ADMIN_INIT_PASSWORD:-}
      ADMIN_INIT_EMAIL: ${ADMIN_INIT_EMAIL:-}
      TZ: UTC
    ports:
      - "8080:8080"
    networks:
      - micoz-net

volumes:
  postgres-data:
    name: micoz-postgres-data

networks:
  micoz-net:
    name: micoz-net
    driver: bridge
